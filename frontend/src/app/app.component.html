<mat-toolbar>
  <span class="brand">Intern Attendance</span>
  <span class="spacer"></span>

  <nav>
    <a mat-button routerLink="/scan" routerLinkActive="active">Scan</a>
    <a mat-button routerLink="/attendance" routerLinkActive="active">Attendance</a>
    <a mat-button routerLink="/admin" routerLinkActive="active">Admin</a>

    <button mat-stroked-button type="button" class="theme-toggle" (click)="toggleTheme()">
      <mat-icon>{{ isLightTheme ? 'dark_mode' : 'light_mode' }}</mat-icon>
      {{ isLightTheme ? 'Dark' : 'Light' }}
    </button>
  </nav>
</mat-toolbar>

<router-outlet></router-outlet>
